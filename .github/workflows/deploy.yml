name: 🚀 Déploiement Automatique (CD)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Connexion SSH et Mise à jour
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd GDG-Discord-Bot
            git fetch --all
            git reset --hard origin/$(git symbolic-ref --short HEAD)
            
            # 1. Sauvegarde de pré-déploiement
            mkdir -p data/backups
            if [ -f "data/veille.db" ]; then
              cp data/veille.db "data/backups/veille-pre-deploy-$(date +%Y%m%d-%H%M%S).db.bak"
            fi

            # 2. Arret propre pour fermer la DB (via le signal TERM que nous gérons maintenant)
            sudo docker-compose down
            
            # 3. Nettoyage des fichiers de verrouillage SQLite au cas où
            sudo rm -f data/*.db-shm data/*.db-wal
            
            # 4. Reconstruction et démarrage
            sudo docker-compose up -d --build
            
            # Nettoyage de l'espace disque
            sudo docker image prune -f
